---

- name: Update DNF package metadata
  hosts: lab
  become: true
  tasks:
    - name: Update DNF package metadata
      dnf:
        update_cache: yes
    - name: Upgrade all packages to the latest version
      dnf:
        name: '*'
        state: latest
    - name: Remove unused packages
      dnf:
        autoremove: yes

- name: Install Managed Node Baseline Packages
  hosts: managed
  become: true
    - name: Install Python 3 and pip
      dnf:
        name:
          - python3
          - python3-pip
        state: present
    - name: Install basic administration tools
      dnf:
        name:
          - vim
          - sudo
          - tree
          - git
        state: present
    - name: Confirm managed node baseline completed
      ansible.builtin.debug:
        msg: "Managed node baseline completed successfully."

---
- name: Apply common baseline to lab systems
  hosts: lab
  become: true
  tasks:
    - name: Update DNF package metadata
      ansible.builtin.dnf:
        update_cache: true

    - name: Ensure common lab packages are installed
      ansible.builtin.dnf:
        name:
          - python3
          - python3-pip
          - nano
          - tree
          - git
        state: present

- name: Validate managed node baseline
  hosts: managed
  become: true
  tasks:
    - name: Confirm managed node baseline completed
      ansible.builtin.debug:
        msg: "Managed node baseline completed successfully."
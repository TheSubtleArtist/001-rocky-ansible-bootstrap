[managed]
managed-node-01 ansible_host=192.168.56.11

[managed:vars]
ansible_user=vagrant
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=/vagrant/.vagrant/machines/managed-node-01/virtualbox/private_key
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'